# Timur Satranci Fairy-Stockfish POC taslagi
#
# Bu dosya dogrudan uretim icin degildir. Amac:
# 1. Fairy-Stockfish'in 10x11 Timur tahtasini kabul edip etmedigini olcmek.
# 2. Temel taslarin legal hamlelerini mevcut JS motoruyla karsilastirmak.
# 3. Hisar, sah degisimi, citadel exchange ve pawn-of-pawns gibi ozel kurallari
#    ayri bir wrapper/C++ katmani gerektiriyor mu netlestirmek.
#
# Bilinen acik noktalar:
# - Hisarlar normal tahta disinda: (0,-1) ve (9,11). Plain variants.ini bunu tam temsil etmez.
# - Zürafa hareketi mevcut oyunda ozel iki asamali bir harekettir; Betza ile birebir olmayabilir.
# - Piyon tipleri ve pawn-of-pawns dongusu plain config ile birebir olmayabilir.
# - Prince/adventitious king coklu kraliyet mantigi ayri dogrulanmalidir.

[timur_poc]
maxRank = 10
maxFile = k
castling = false
doubleStep = false
nFoldRule = 3
nMoveRule = 50
stalemateValue = win

# Baslangic dizilimi: mevcut oyundaki "eril" dizilime yakin 10x11 ana tahta.
# Fairy FEN sirasinda ilk satir siyah arka hat, son satir beyaz arka hattir.
# Not: Bu taslakta hisar kareleri yoktur.
startFen = ecd5dce/rntzgkvztnr/ppppppppppp/11/11/11/11/PPPPPPPPPPP/RNTZGKVZTNR/ECD5DCE w - - 0 1

# Fairy-Stockfish'in bos "fairy" sablonunda standart taslar otomatik gelmez.
# Bu nedenle klasik taslari da acikca tanimliyoruz.
pawn = p
knight = n
rook = r
king = k

# Harf esleme notu:
# K/k: Sah
# R/r: Kale
# N/n: At
# E/e: Fil/Elephant
# D/d: Dabbaba
# C/c: Deve/Camel
# V/v: Vezir, ortogonal tek kare
# G/g: General, diagonal tek kare
# T/t: Picket, simdilik yaklasik
# Z/z: Zurafa, simdilik yaklasik
# P/p: Piyon
# S/s: Deniz canavari, vezir gibi ortogonal tek kare
# L/l: Aslan, 3 kare ortogonal siçrama
# B/b: Boga, 3-2 siçrama
# H/h: Acici/Revealer, 3-3 siçrama
# Q/q: Prens, sah gibi tek kare
# A/a: Tavsiye/adventitious king, sah gibi tek kare

customPiece1 = v:W
customPiece2 = g:F
customPiece3 = e:A
customPiece4 = d:D
customPiece5 = c:C
customPiece6 = s:W
customPiece7 = l:H
customPiece8 = b:Z
customPiece9 = h:G
customPiece10 = q:K
customPiece11 = a:K

# Gecici yaklasimlar:
# Picket normalde capraz en az 2 kare gider; B birinci kareyi de dahil eder.
# Zurafa mevcut oyunda iki asamali ozel hareket yapar. Plain variants.ini bunu
# birebir ifade edemedigi icin POC'ta yanlis hamle uretmesin diye hareketsizdir.
customPiece12 = t:B
immobile = z

promotionRegionWhite = *10
promotionRegionBlack = *1
promotionPieceTypes = vgnerdc
mandatoryPawnPromotion = true
